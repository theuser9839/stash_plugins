name: "External Gallery Viewer"
description: "Advanced gallery viewing overlay with playlist docking"
version: "1.0.0"

exec:
  - python
  - "{pluginDir}/backend/main.py"

interface: raw

ui:
  javascript:
    - frontend/main.js
  css:
    - frontend/main.css


tasks:
  - name: "Launch External Player"
    description: "Spawns the local desktop gallery viewer application"
  - name: "Launch Scene Player"
    description: "Spawns the local desktop video player application"
    
settings:
  viewer_path:
    displayName: "External Viewer Application Path"
    type: STRING
  player_path:
    displayName: "External Video Player Application Path"
    type: STRING
