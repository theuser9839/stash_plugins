name: "Universal Media Launcher"
description: "Creates playlists to view galleries and scenes directly into the user selected native desktop applications."
version: "1.0.0"

exec:
  - python
  - "{pluginDir}/backend/main.py"

interface: raw

ui:
  javascript:
    - frontend/main.js
  css:
    - frontend/main.css


tasks:
  - name: "Launch Image Viewer"
    description: "Spawns the local desktop image viewer application"
  - name: "Launch Video Player"
    description: "Spawns the local desktop video player application"
  - name: "Wipe Virtual Folders"
    description: "Clears out the temporary virtual directory shortcuts from disk"
    
settings:
  viewer_path:
    displayName: "External Image Viewer Application Path"
    type: STRING
  player_path:
    displayName: "External Video Player Application Path"
    type: STRING
  clean_on_exit:
    displayName: "Clean virtual folders when picker closes"
    type: BOOLEAN
